{% extends "base.html" %}
{% block title %}404 — Not Found{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center">
        <div class="w-20 h-20 rounded-2xl bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center mx-auto mb-6">
            <i data-lucide="compass" class="h-10 w-10 text-primary-600 dark:text-primary-400"></i>
        </div>
        <p class="text-7xl font-bold text-slate-200 dark:text-slate-700 select-none">404</p>
        <h1 class="mt-2 text-2xl font-bold text-slate-800 dark:text-slate-100">Page Not Found</h1>
        <p class="mt-2 text-slate-500 dark:text-slate-400 max-w-sm mx-auto">
            The page you are looking for does not exist or may have been moved.
        </p>
        <div class="mt-8">
            <a href="{% url 'auth_core:dashboard' %}" class="btn-primary">
                <i data-lucide="layout-dashboard" class="h-4 w-4"></i>
                Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
