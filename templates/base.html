{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}SAMS{% endblock %} — Smart Attendance</title>

    <!-- Dark mode: applied before render to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem("sams_theme");
            if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                document.documentElement.classList.add("dark");
            }
        })();
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- SweetAlert2 (loaded before body so Swal is available for messages partial) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "#2563EB",
                            50:  "#EFF6FF",
                            100: "#DBEAFE",
                            500: "#3B82F6",
                            600: "#2563EB",
                            700: "#1D4ED8",
                            800: "#1E40AF",
                        },
                        nav: {
                            DEFAULT: "#0F172A",
                            hover:   "#1E293B",
                            active:  "#2563EB",
                        },
                        surface: {
                            DEFAULT: "#F8FAFC",
                        },
                        success: "#10B981",
                        warning: "#F59E0B",
                        danger:  "#EF4444",
                    },
                    fontFamily: {
                        sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
                    },
                },
            },
        };
    </script>

    <!-- Tailwind component classes (processed by CDN) -->
    <style type="text/tailwindcss">
        @layer components {
            /* ── Buttons ─────────────────────────── */
            .btn-primary {
                @apply inline-flex items-center gap-2 px-4 py-2 bg-primary-600 text-white text-sm font-medium rounded-lg hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed;
            }
            .btn-secondary {
                @apply inline-flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-medium rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-slate-300 focus:ring-offset-2 transition-colors duration-150;
            }
            .btn-danger {
                @apply inline-flex items-center gap-2 px-4 py-2 bg-danger text-white text-sm font-medium rounded-lg hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2 transition-colors duration-150 disabled:opacity-50;
            }
            .btn-success {
                @apply inline-flex items-center gap-2 px-4 py-2 bg-success text-white text-sm font-medium rounded-lg hover:bg-emerald-600 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:ring-offset-2 transition-colors duration-150;
            }
            /* ── Cards ───────────────────────────── */
            .card {
                @apply bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm;
            }
            /* ── Forms ───────────────────────────── */
            .input-field {
                @apply block w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors duration-150;
            }
            .input-label {
                @apply block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1;
            }
            .input-error {
                @apply mt-1 text-xs text-danger;
            }
            .input-error-state {
                @apply border-danger ring-2 ring-danger/30 focus:ring-danger focus:border-danger;
            }
            .input-success-state {
                @apply border-success ring-2 ring-success/30 focus:ring-success focus:border-success;
            }
            /* ── Sidebar ─────────────────────────── */
            .sidebar-link {
                @apply flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-nav-hover text-sm font-medium transition-colors duration-150;
            }
            .sidebar-link-active {
                @apply flex items-center gap-3 px-3 py-2.5 rounded-lg text-white bg-primary-600 text-sm font-medium;
            }
            /* ── Badges ──────────────────────────── */
            .badge-success {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-400;
            }
            .badge-warning {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400;
            }
            .badge-danger {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400;
            }
            .badge-info {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400;
            }
            /* ── Tables ──────────────────────────── */
            .table-base {
                @apply w-full text-sm text-left;
            }
            .table-header {
                @apply px-4 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider bg-slate-50 dark:bg-slate-800/50;
            }
            .table-cell {
                @apply px-4 py-3 text-sm text-slate-700 dark:text-slate-300;
            }
            .table-row {
                @apply border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors duration-100;
            }
        }
    </style>

    <!-- App CSS -->
    <link rel="stylesheet" href="{% static 'css/app.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-surface dark:bg-slate-900 text-slate-900 dark:text-slate-100{% endblock %} font-sans antialiased min-h-screen">

    {% block body %}
        {% block content %}{% endblock %}
    {% endblock %}

    <!-- Django messages → SweetAlert2 toasts -->
    {% include "partials/messages.html" %}

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- App JS -->
    <script src="{% static 'js/app.js' %}"></script>

    <!-- Form Validation -->
    <script src="{% static 'js/forms/validators.js' %}"></script>
    <script src="{% static 'js/forms/form-validation.js' %}"></script>
    <script src="{% static 'js/sidebar.js' %}"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
