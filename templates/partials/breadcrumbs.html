
{% if breadcrumbs %}
<nav aria-label="Breadcrumb">
    <ol class="flex items-center gap-1.5 text-sm">
        {% for crumb in breadcrumbs %}
            {% if not forloop.last %}
                <li>
                    <a href="{{ crumb.url }}"
                       class="text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors">
                        {{ crumb.label }}
                    </a>
                </li>
                <li class="text-slate-300 dark:text-slate-600 select-none">/</li>
            {% else %}
                <li>
                    <span class="font-medium text-slate-800 dark:text-slate-100" aria-current="page">
                        {{ crumb.label }}
                    </span>
                </li>
            {% endif %}
        {% endfor %}
    </ol>
</nav>
{% endif %}
