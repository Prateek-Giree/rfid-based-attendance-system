
<div class="card p-12 flex flex-col items-center justify-center text-center">
    <div class="w-14 h-14 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center mb-4">
        <i data-lucide="{{ icon|default:'inbox' }}" class="h-7 w-7 text-slate-400 dark:text-slate-500"></i>
    </div>
    <h3 class="text-base font-semibold text-slate-700 dark:text-slate-200 mb-1">
        {{ title|default:"Nothing here yet" }}
    </h3>
    <p class="text-sm text-slate-500 dark:text-slate-400 max-w-xs">
        {{ message|default:"No records found." }}
    </p>
    {% if action_url and action_label %}
    <div class="mt-5">
        <a href="{{ action_url }}" class="btn-primary">
            <i data-lucide="plus" class="h-4 w-4"></i>
            {{ action_label }}
        </a>
    </div>
    {% endif %}
</div>
